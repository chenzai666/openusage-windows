# Build Windows installers (NSIS + MSI) and publish to GitHub Releases.
# No Docker / Docker Hub required.
#
# Triggers:
#   - push tag vX.Y.Z  → build + create GitHub Release
#   - workflow_dispatch → build + upload artifacts (optional release)

name: Publish Windows

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      create_release:
        description: "Create/update a GitHub Release after build"
        type: boolean
        default: false
      tag_name:
        description: "Release tag (e.g. v0.6.28). Required when create_release is true."
        type: string
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_type == 'tag' && github.ref_name || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Bundle plugins
        run: npm run bundle:plugins

      - name: Verify bundled plugins
        shell: pwsh
        run: |
          $count = (Get-ChildItem -Path src-tauri/resources/bundled_plugins -Recurse -Filter plugin.json -ErrorAction SilentlyContinue).Count
          if ($count -lt 1) {
            throw "No bundled plugins found under src-tauri/resources/bundled_plugins."
          }
          Write-Host "Bundled plugins: $count"

      - name: Validate release tag (tag / release builds only)
        if: github.ref_type == 'tag' || (github.event_name == 'workflow_dispatch' && inputs.create_release)
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${RELEASE_TAG:-}" ]]; then
            echo "Missing RELEASE_TAG (push a v* tag, or set tag_name for workflow_dispatch)."
            exit 1
          fi
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-].*)?$ ]]; then
            echo "Invalid RELEASE_TAG: $RELEASE_TAG (expected vMAJOR.MINOR.PATCH)"
            exit 1
          fi

          TAG_VERSION="${RELEASE_TAG#v}"
          # Allow pre-release suffix in tag (e.g. v0.6.28-beta.1) → compare base for package version optionally
          TAG_BASE="${TAG_VERSION%%-*}"
          TAG_BASE="${TAG_BASE%%+*}"

          TAURI_CONF_VERSION=$(node -p 'require("./src-tauri/tauri.conf.json").version')
          CARGO_VERSION=$(node -p 'const fs=require("fs"); const t=fs.readFileSync("./src-tauri/Cargo.toml","utf8"); const m=t.match(/^version\s*=\s*"([^"]+)"/m); if(!m) process.exit(1); m[1]')
          PKG_VERSION=$(node -p 'require("./package.json").version')

          echo "tag=$RELEASE_TAG base=$TAG_BASE tauri=$TAURI_CONF_VERSION cargo=$CARGO_VERSION pkg=$PKG_VERSION"

          if [[ "$TAURI_CONF_VERSION" != "$TAG_BASE" && "$TAURI_CONF_VERSION" != "$TAG_VERSION" ]]; then
            echo "src-tauri/tauri.conf.json version ($TAURI_CONF_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          if [[ "$CARGO_VERSION" != "$TAG_BASE" && "$CARGO_VERSION" != "$TAG_VERSION" ]]; then
            echo "src-tauri/Cargo.toml version ($CARGO_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          if [[ "$PKG_VERSION" != "$TAG_BASE" && "$PKG_VERSION" != "$TAG_VERSION" ]]; then
            echo "package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Build Windows app + installers (NSIS + MSI)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          # Only create a GitHub Release for tags or explicit dispatch
          tagName: ${{ (github.ref_type == 'tag' || (github.event_name == 'workflow_dispatch' && inputs.create_release)) && env.RELEASE_TAG || '' }}
          releaseName: ${{ (github.ref_type == 'tag' || (github.event_name == 'workflow_dispatch' && inputs.create_release)) && format('OpenUsage for Windows {0}', env.RELEASE_TAG) || '' }}
          releaseBody: |
            ## OpenUsage for Windows ${{ env.RELEASE_TAG }}

            Windows system-tray AI usage tracker.

            ### Downloads
            - **NSIS installer** (`.exe`) — recommended for most users
            - **MSI installer** (`.msi`) — for enterprise / silent deploy

            ### Requirements
            - Windows 10/11
            - WebView2 (bootstrapper included if missing)

            Built with GitHub Actions on `windows-latest`.
          releaseDraft: false
          prerelease: ${{ contains(env.RELEASE_TAG, '-') }}
          includeUpdaterJson: false
          # Match tauri.conf.json bundle.targets
          args: --bundles nsis,msi

      - name: Upload build artifacts (always)
        uses: actions/upload-artifact@v4
        with:
          name: openusage-windows-installers
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error
          retention-days: 30
